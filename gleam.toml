name = "datadog_client"
version = "1.0.0"
description = "Minimal Datadog v1 metrics client"
licences = ["Apache-2.0"]
repository = { type = "github", user = "Brickell-Research", repo = "datadog-client" }
links = [{ title = "Repository", href = "https://github.com/Brickell-Research/datadog-client" }]
target = "erlang"

[dependencies]
gleam_stdlib = ">= 0.40.0 and < 3.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
gleam_httpc = ">= 4.0.0 and < 6.0.0"
gleam_json = ">= 2.0.0 and < 4.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
